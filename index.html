<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>First-Life</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
            }
          }
        }
      }
    }
  </script>

  <base href="/VERSIBMRETYPING/">
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body class="min-h-screen bg-slate-900 text-white">
  <header class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
    <h1 class="text-xl font-semibold tracking-wide">First-Life</h1>
    <div class="flex items-center gap-2">
      <button id="installBtn" class="hidden px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">Install</button>
      <button id="logoutBtn" class="hidden px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">Log keluar</button>
    </div>
  </header>

  <main id="app" class="p-4">
    <section id="page-login" class="grid place-items-center">
      <div class="max-w-md w-full bg-slate-800/50 rounded-lg p-6">
        <h2 class="text-lg font-semibold tracking-wide mb-2">Masuk akaun</h2>
        <p class="text-slate-300 mb-4">Log masuk dengan Google untuk mula menyimpan subjek, topik, dan fakta anda.</p>
        <button id="loginBtn" class="w-full px-4 py-2 rounded bg-slate-800 hover:bg-slate-700 font-semibold tracking-wide">
          Log masuk dengan Google
        </button>
      </div>
    </section>

    <section id="page-subjects" class="hidden">
      <div class="mb-4 flex items-center gap-2">
        <input id="subjectSearch" type="text" placeholder="Cari subjek..." 
               class="w-full px-3 py-2 rounded bg-slate-800 placeholder-slate-400 
                      focus:outline-none focus:ring-2 focus:ring-slate-700" />
        <button id="addSubjectBtn" 
                class="px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 font-semibold">
          Tambah subjek
        </button>
      </div>
      <div id="subjectsList" class="grid gap-2"></div>
    </section>

    <section id="page-topics" class="hidden">
      <div class="mb-2 flex items-center justify-between">
        <button id="backToSubjects" 
                class="px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">
          Kembali
        </button>
        <h3 id="currentSubjectName" class="font-semibold tracking-wide"></h3>
      </div>
      <div class="mb-4 flex items-center gap-2">
        <input id="topicSearch" type="text" placeholder="Cari topik..." 
               class="w-full px-3 py-2 rounded bg-slate-800 placeholder-slate-400 
                      focus:outline-none focus:ring-2 focus:ring-slate-700" />
        <button id="addTopicBtn" 
                class="px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 font-semibold">
          Tambah topik
        </button>
      </div>
      <div id="topicsList" class="grid gap-2"></div>
    </section>

    <section id="page-facts" class="hidden">
      <div class="sticky top-0 z-10 bg-slate-900/95 backdrop-blur-sm pb-3 pt-1 border-b border-slate-800 mb-4">
        <div class="mb-3 flex items-center justify-between">
          <button id="backToTopics" 
                  class="px-4 py-2 rounded bg-slate-800 hover:bg-slate-700 text-sm font-bold border border-slate-700 shadow-lg">
            ← Kembali
          </button>
          <h3 id="currentTopicName" class="font-semibold tracking-wide text-blue-400 truncate ml-2"></h3>
        </div>
        <div class="flex items-center gap-2">
          <input id="factSearch" type="text" placeholder="Cari fakta..." 
                 class="w-full px-3 py-2 rounded bg-slate-800 placeholder-slate-400 
                        focus:outline-none focus:ring-2 focus:ring-slate-700" />
          <button id="btnModTambah" class="px-3 py-2 rounded bg-slate-700 hover:bg-slate-600 font-semibold whitespace-nowrap">
            Tambah Fakta
          </button>
        </div>
      </div>

      <div id="factsList" class="grid gap-2 mb-4"></div>

      <div id="bulkAddContainer" class="hidden flex flex-col gap-2 mb-8 p-3 bg-slate-800/50 rounded-lg border border-slate-700">
        <div class="flex gap-2 mb-2">
          <button id="btnWizard" class="flex-1 py-2 bg-blue-900/40 hover:bg-blue-800/60 rounded text-[10px] font-bold border border-blue-700 shadow-sm transition-all uppercase">
            🔢 CARI & SUB BIJAK
          </button>
        </div>
        <textarea id="bulkFactsInput" rows="5" placeholder="Contoh:&#10;Tajuk&#10;Ayat fakta..." 
                  class="w-full px-3 py-2 rounded bg-slate-900 text-sm focus:outline-none border border-slate-700"></textarea>
        <button id="btnTambahSemuaPantas" class="w-full py-2 rounded bg-blue-700 hover:bg-blue-600 font-bold text-sm">
          Proses Masuk Semua
        </button>
      </div>
    </section>

    <section id="page-practice" class="hidden">
      <div class="mb-2 flex items-center justify-between">
        <button id="backToFacts" class="px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">Kembali</button>
        <div class="text-sm text-slate-300 font-semibold">Ulangan: <span id="practiceCount" class="text-blue-400">0</span></div>
      </div>
      
      <div class="mb-4 p-3 bg-slate-800/30 rounded-lg border border-slate-800">
        <h4 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Fakta</h4>
        <div id="practiceFactTitle" class="text-lg font-bold text-slate-200 mb-3"></div>
        <h4 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Ayat</h4>
        <div id="practiceFactSentence" class="text-slate-300 italic"></div>
      </div>

      <div id="practiceRows" class="grid gap-4 mb-20 transition-all duration-500"></div>

      <div class="mt-4 pb-10">
        <button id="submitPracticeBtn" class="w-full py-3 rounded bg-blue-700 hover:bg-blue-600 font-bold shadow-xl border border-blue-500">
          Semak Jawapan
        </button>
        <p id="practiceFeedback" class="mt-3 text-center font-semibold text-slate-200"></p>
      </div>

      <button id="addPracticeRowBtn" 
              class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 
                     flex items-center justify-center shadow-2xl z-30 border-2 border-slate-500 text-2xl font-bold">
        +
      </button>
    </section>
  </main>

  <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-bold opacity-0 transition-opacity pointer-events-none z-50">
    Disalin!
  </div>

  <footer class="px-4 py-6 text-center text-sm text-slate-400">Very good job!</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs, query, orderBy, enableIndexedDbPersistence } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDei41iK-bTsffaza5lKO9fM3l_4jF8sec",
      authDomain: "versibmretyping.firebaseapp.com",
      projectId: "versibmretyping",
      storageBucket: "versibmretyping.firebasestorage.app",
      messagingSenderId: "216301139894",
      appId: "1:216301139894:web:6f55797142cf61aa8eb317",
      measurementId: "G-D7ZH9R8ZHL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    enableIndexedDbPersistence(db).catch(err => console.warn("Persistence error:", err.code));

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    let uid = null;
    let currentSubject = null;
    let currentTopic = null;
    let currentFact = null;

    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const installBtn = document.getElementById('installBtn');

    loginBtn.addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); } catch (e) { alert('Gagal: ' + e.message); }
    });
    logoutBtn.addEventListener('click', async () => { await signOut(auth); });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        uid = user.uid;
        logoutBtn.classList.remove('hidden');
        installBtn.classList.remove('hidden');
        showPage('subjects');
        await loadSubjects();
      } else {
        uid = null;
        logoutBtn.classList.add('hidden');
        showPage('login');
      }
    });

    const pages = {
      login: document.getElementById('page-login'),
      subjects: document.getElementById('page-subjects'),
      topics: document.getElementById('page-topics'),
      facts: document.getElementById('page-facts'),
      practice: document.getElementById('page-practice'),
    };
    function showPage(name) {
      Object.values(pages).forEach(el => el.classList.add('hidden'));
      pages[name].classList.remove('hidden');
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1500);
      });
    }

    // === Subjects ===
    async function loadSubjects(filterText = '') {
      const subjectsList = document.getElementById('subjectsList');
      subjectsList.innerHTML = '';
      const q = query(collection(db, 'users', uid, 'subjects'), orderBy('name', 'asc'));
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = d.data();
        if (filterText && !data.name.toLowerCase().includes(filterText.toLowerCase())) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'flex items-center gap-2 bg-slate-800 rounded p-2';
        wrapper.innerHTML = `<button class="flex-1 text-left font-medium">${data.name}</button>
          <button class="edit-s-btn">✏️</button>
          <button class="del-s-btn">🗑️</button>`;
        wrapper.querySelector('button').onclick = () => enterSubject({id: d.id, ...data});
        wrapper.querySelector('.edit-s-btn').onclick = async () => {
          const n = prompt('Edit nama subjek:', data.name);
          if (n) { await updateDoc(d.ref, {name: n}); loadSubjects(filterText); }
        };
        wrapper.querySelector('.del-s-btn').onclick = async () => {
          if (confirm('Padam subjek ini?')) { await deleteDoc(d.ref); loadSubjects(filterText); }
        };
        subjectsList.appendChild(wrapper);
      });
    }
    document.getElementById('addSubjectBtn').onclick = async () => {
      const n = prompt('Nama subjek?');
      if (n) { await addDoc(collection(db, 'users', uid, 'subjects'), {name: n, createdAt: Date.now()}); loadSubjects(); }
    };
    document.getElementById('subjectSearch').oninput = e => loadSubjects(e.target.value);
    function enterSubject(s) {
      currentSubject = s;
      document.getElementById('currentSubjectName').textContent = s.name;
      showPage('topics'); loadTopics();
    }

    // === Topics ===
    async function loadTopics(filterText = '') {
      const topicsList = document.getElementById('topicsList');
      topicsList.innerHTML = '';
      const q = query(collection(db, 'users', uid, 'subjects', currentSubject.id, 'topics'), orderBy('name', 'asc'));
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = d.data();
        if (filterText && !data.name.toLowerCase().includes(filterText.toLowerCase())) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'flex items-center gap-2 bg-slate-800 rounded p-2';
        wrapper.innerHTML = `<button class="flex-1 text-left font-medium">${data.name}</button>
          <button class="edit-t-btn">✏️</button>
          <button class="del-t-btn">🗑️</button>`;
        wrapper.querySelector('button').onclick = () => enterTopic({id: d.id, ...data});
        wrapper.querySelector('.edit-t-btn').onclick = async () => {
          const n = prompt('Edit nama topik:', data.name);
          if (n) { await updateDoc(d.ref, {name: n}); loadTopics(filterText); }
        };
        wrapper.querySelector('.del-t-btn').onclick = async () => {
          if (confirm('Padam topik ini?')) { await deleteDoc(d.ref); loadTopics(filterText); }
        };
        topicsList.appendChild(wrapper);
      });
    }
    document.getElementById('addTopicBtn').onclick = async () => {
      const n = prompt('Nama topik?');
      if (n) { await addDoc(collection(doc(db, 'users', uid, 'subjects', currentSubject.id), 'topics'), {name: n, createdAt: Date.now()}); loadTopics(); }
    };
    document.getElementById('backToSubjects').onclick = () => showPage('subjects');
    function enterTopic(t) {
      currentTopic = t;
      document.getElementById('currentTopicName').textContent = t.name;
      showPage('facts'); loadFacts();
    }

    // === Facts & WIZARD (LOGIK BARU) ===
    const btnWizard = document.getElementById('btnWizard');
    const bulkFactsInput = document.getElementById('bulkFactsInput');
    const factsList = document.getElementById('factsList');

    btnWizard.onclick = async () => {
      const ref = doc(db, 'users', uid, 'subjects', currentSubject.id, 'topics', currentTopic.id);
      const snap = await getDocs(query(collection(ref, 'facts'), orderBy('title', 'asc')));
      let items = [];
      snap.forEach(d => items.push({ title: d.data().title, trace: d.data().parentTrace || "" }));

      if (items.length === 0) {
        const start = prompt("Tiada rujukan. Masukkan tajuk utama (cth: 001.Ali):", "001.");
        if (start) bulkFactsInput.value += `${start}\n(Isi ayat)\n\n`;
        return;
      }

      const searchKey = prompt(`Cari rujukan (cth: Ali):`);
      if (!searchKey) return;
      const found = items.filter(it => it.title.toLowerCase().includes(searchKey.toLowerCase()));
      let selected;
      if (found.length === 0) { alert("Tiada!"); return; }
      else if (found.length === 1) { selected = found[0]; }
      else {
        const pick = prompt(`Pilih nombor:\n${found.map((f, i) => `${i+1}. ${f.title}`).join('\n')}`);
        if (!pick) return;
        selected = found[parseInt(pick)-1];
      }

      const newLabel = prompt(`Masukkan nama SUB bagi [${selected.title}]:`);
      if (!newLabel) return;

      const currentFullTrace = selected.trace ? `${selected.trace} » ${selected.title}` : selected.title;
      const finalTitle = `${selected.title.split('.')[0]}.${items.length + 1}.${newLabel}`;
      bulkFactsInput.value += `${finalTitle}\n(Isi ayat)\n[TRACE:${currentFullTrace}]\n\n`;
      bulkFactsInput.focus();
    };

    async function loadFacts(filterText = '') {
      factsList.innerHTML = '';
      const ref = doc(db, 'users', uid, 'subjects', currentSubject.id, 'topics', currentTopic.id);
      const q = query(collection(ref, 'facts'), orderBy('title', 'asc'));
      const snap = await getDocs(q);
      
      snap.forEach(d => {
        const data = d.data();
        if (filterText && !data.title.toLowerCase().includes(filterText.toLowerCase())) return;

        let traceHtml = "";
        if (data.parentTrace) {
           const hierarchy = data.parentTrace.split(' » '); 
           const colors = ['text-blue-400', 'text-green-400', 'text-yellow-400', 'text-orange-400', 'text-red-400', 'text-pink-400'];
           const coloredPath = hierarchy.map((name, i) => `<span class="${colors[i] || 'text-purple-400'} font-bold">${name}</span>`).join(' <span class="text-slate-600 mx-1">»</span> ');
           traceHtml = `<div class="bg-slate-950/80 px-3 py-1.5 rounded border border-slate-700 text-[11px] mb-2 w-fit"><span class="text-slate-500 italic mr-1">Sub bagi:</span> ${coloredPath}</div>`;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'flex flex-col gap-2 bg-slate-800 rounded p-3 border border-slate-700 mb-2';
        wrapper.innerHTML = `
          ${traceHtml}
          <div class="flex justify-between items-start gap-2">
            <div class="flex-1">
              <div class="font-bold text-blue-400">${data.title}</div>
              <div class="text-sm text-slate-300 italic mt-1">${data.sentence}</div>
            </div>
            <div class="flex flex-col gap-2">
              <button class="cp-t p-2 bg-slate-700 rounded text-xs">📋</button>
              <button class="cp-s p-2 bg-slate-700 rounded text-xs">📝</button>
            </div>
          </div>
          <div class="flex items-center gap-3 justify-end mt-2 pt-2 border-t border-slate-700/50">
            <button class="prac-btn text-xs bg-slate-700 px-2 py-1 rounded">📝 Latih</button>
            <button class="edit-t text-xs bg-slate-700 px-2 py-1 rounded">✏️ Tajuk</button>
            <button class="edit-s text-xs bg-slate-700 px-2 py-1 rounded">✏️ Ayat</button>
            <button class="del-btn text-xs bg-red-900/50 px-2 py-1 rounded">🗑️</button>
          </div>
        `;
        wrapper.querySelector('.cp-t').onclick = () => copyToClipboard(data.title);
        wrapper.querySelector('.cp-s').onclick = () => copyToClipboard(data.sentence);
        wrapper.querySelector('.prac-btn').onclick = () => startPractice({id: d.id, ...data});
        wrapper.querySelector('.edit-t').onclick = async () => {
          const nt = prompt('Edit tajuk:', data.title);
          if (nt) { await updateDoc(d.ref, {title: nt}); loadFacts(filterText); }
        };
        wrapper.querySelector('.edit-s').onclick = async () => {
          const ns = prompt('Edit ayat:', data.sentence);
          if (ns) { await updateDoc(d.ref, {sentence: ns}); loadFacts(filterText); }
        };
        wrapper.querySelector('.del-btn').onclick = async () => {
          if (confirm('Padam?')) { await deleteDoc(d.ref); loadFacts(filterText); }
        };
        factsList.appendChild(wrapper);
      });
    }

    document.getElementById('btnTambahSemuaPantas').onclick = async () => {
      const text = bulkFactsInput.value.trim();
      if (!text) return;
      const ref = collection(db, 'users', uid, 'subjects', currentSubject.id, 'topics', currentTopic.id, 'facts');
      const blocks = text.split(/\n\s*\n/);
      for (const block of blocks) {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (lines.length >= 2) {
          let parentTrace = "";
          const traceIdx = lines.findIndex(l => l.startsWith('[TRACE:'));
          if (traceIdx !== -1) {
            parentTrace = lines[traceIdx].replace('[TRACE:', '').replace(']', '');
            lines.splice(traceIdx, 1);
          }
          await addDoc(ref, { title: lines[0], sentence: lines[1], parentTrace, createdAt: Date.now() });
        }
      }
      bulkFactsInput.value = ''; document.getElementById('bulkAddContainer').classList.add('hidden'); loadFacts();
    };
    document.getElementById('btnModTambah').onclick = () => document.getElementById('bulkAddContainer').classList.toggle('hidden');
    document.getElementById('backToTopics').onclick = () => showPage('topics');
    document.getElementById('factSearch').oninput = e => loadFacts(e.target.value);

    // === PRACTICE (LEVENSHTEIN KEKAL) ===
    function startPractice(f) {
      currentFact = f;
      document.getElementById('practiceFactTitle').textContent = f.title;
      document.getElementById('practiceFactSentence').textContent = f.sentence;
      document.getElementById('practiceFeedback').textContent = '';
      practiceRows.innerHTML = '';
      showPage('practice'); addPracticeRow();
    }
    function addPracticeRow() {
      const div = document.createElement('div');
      div.className = 'flex flex-col gap-1';
      div.innerHTML = `<div class="flex items-center gap-2">
            <textarea class="flex-1 px-3 py-2 rounded bg-slate-800 text-sm focus:ring-1 focus:ring-slate-600 outline-none border border-transparent" rows="2" placeholder="Taip semula..."></textarea>
            <button class="btn-del-row text-lg p-2 hover:bg-slate-700 rounded">🗑️</button>
        </div>`;
      div.querySelector('.btn-del-row').onclick = () => { div.remove(); updatePracticeCount(); };
      practiceRows.appendChild(div); updatePracticeCount();
    }
    document.getElementById('addPracticeRowBtn').onclick = addPracticeRow;
    function updatePracticeCount() { document.getElementById('practiceCount').textContent = practiceRows.children.length; }
    document.getElementById('backToFacts').onclick = () => showPage('facts');

    function getLevenshtein(a, b) {
      const tmp = [];
      for (let i = 0; i <= a.length; i++) tmp[i] = [i];
      for (let j = 0; j <= b.length; j++) tmp[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          tmp[i][j] = Math.min(tmp[i-1][j]+1, tmp[i][j-1]+1, tmp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
        }
      }
      return tmp[a.length][b.length];
    }

    document.getElementById('submitPracticeBtn').onclick = () => {
      const rows = practiceRows.querySelectorAll('div.flex-col');
      const targetSentence = currentFact.sentence.trim();
      const targetWords = targetSentence.split(/\s+/);
      rows.forEach(row => {
        const input = row.querySelector('textarea');
        let feedbackArea = row.querySelector('.ejaan-feedback') || document.createElement('div');
        feedbackArea.className = "ejaan-feedback text-[11px] mt-1 leading-relaxed px-1";
        if (!row.querySelector('.ejaan-feedback')) row.appendChild(feedbackArea);

        const userSentence = input.value.trim();
        const userWords = userSentence.split(/\s+/);

        if (userSentence.toLowerCase() === targetSentence.toLowerCase()) {
          input.className = "flex-1 px-3 py-2 rounded bg-slate-800/40 text-slate-600 text-sm transition-all";
          row.style.opacity = "0.4";
          feedbackArea.innerHTML = "<span class='text-green-500 font-bold'>✓ Tepat</span>";
        } else {
          let htmlResult = "";
          targetWords.forEach((tWord, index) => {
            const uWord = userWords[index] || "";
            const dist = getLevenshtein(tWord.toLowerCase().replace(/[.,!?;]/g, ""), uWord.toLowerCase().replace(/[.,!?;]/g, ""));
            const tolerance = Math.max(1, Math.floor(tWord.length / 3));
            if (uWord === "") htmlResult += `<span class="text-slate-500 line-through opacity-50">${tWord}</span> `;
            else if (dist === 0) htmlResult += `<span class="text-slate-400">${uWord}</span> `;
            else if (dist <= tolerance) htmlResult += `<span class="text-orange-400 font-bold underline">${uWord}</span> `;
            else htmlResult += `<span class="text-red-500 font-bold underline">${uWord}</span> `;
          });
          input.className = "flex-1 px-3 py-2 rounded bg-red-900/10 border-red-500/30 text-white text-sm";
          feedbackArea.innerHTML = htmlResult;
        }
      });
      document.getElementById('practiceFeedback').textContent = `Selesai menyemak.`;
    };
  </script>
</body>
</html>
