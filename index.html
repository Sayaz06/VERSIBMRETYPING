<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>First-Life</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
            }
          }
        }
      }
    }
  </script>

  <base href="/VERSIBMRETYPING/">
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body class="min-h-screen bg-slate-900 text-white">
  <header class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
    <h1 class="text-xl font-semibold tracking-wide">First-Life</h1>
    <div class="flex items-center gap-2">
      <button id="installBtn" class="hidden px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">Install</button>
      <button id="logoutBtn" class="hidden px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">Log keluar</button>
    </div>
  </header>

  <main id="app" class="p-4">
    <section id="page-login" class="grid place-items-center">
      <div class="max-w-md w-full bg-slate-800/50 rounded-lg p-6">
        <h2 class="text-lg font-semibold tracking-wide mb-2">Masuk akaun</h2>
        <p class="text-slate-300 mb-4">Log masuk dengan Google untuk mula menyimpan subjek, topik, dan fakta anda.</p>
        <button id="loginBtn" class="w-full px-4 py-2 rounded bg-slate-800 hover:bg-slate-700 font-semibold tracking-wide">
          Log masuk dengan Google
        </button>
      </div>
    </section>

    <section id="page-subjects" class="hidden">
      <div class="mb-4 flex items-center gap-2">
        <input id="subjectSearch" type="text" placeholder="Cari subjek..." 
               class="w-full px-3 py-2 rounded bg-slate-800 placeholder-slate-400 
                      focus:outline-none focus:ring-2 focus:ring-slate-700" />
        <button id="addSubjectBtn" 
                class="px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 font-semibold">
          Tambah subjek
        </button>
      </div>
      <div id="subjectsList" class="grid gap-2"></div>
    </section>

    <section id="page-topics" class="hidden">
      <div class="mb-2 flex items-center justify-between">
        <button id="backToSubjects" 
                class="px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">
          Kembali
        </button>
        <h3 id="currentSubjectName" class="font-semibold tracking-wide"></h3>
      </div>
      <div class="mb-4 flex items-center gap-2">
        <input id="topicSearch" type="text" placeholder="Cari topik..." 
               class="w-full px-3 py-2 rounded bg-slate-800 placeholder-slate-400 
                      focus:outline-none focus:ring-2 focus:ring-slate-700" />
        <button id="addTopicBtn" 
                class="px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 font-semibold">
          Tambah topik
        </button>
      </div>
      <div id="topicsList" class="grid gap-2"></div>
    </section>

    <section id="page-facts" class="hidden">
      <div class="sticky top-0 z-10 bg-slate-900/95 backdrop-blur-sm pb-3 pt-1 border-b border-slate-800 mb-4">
        <div class="mb-3 flex items-center justify-between">
          <button id="backToTopics" 
                  class="px-4 py-2 rounded bg-slate-800 hover:bg-slate-700 text-sm font-bold border border-slate-700 shadow-lg">
            ← Kembali
          </button>
          <h3 id="currentTopicName" class="font-semibold tracking-wide text-blue-400 truncate ml-2"></h3>
        </div>
        <div class="flex items-center gap-2">
          <input id="factSearch" type="text" placeholder="Cari fakta..." 
                 class="w-full px-3 py-2 rounded bg-slate-800 placeholder-slate-400 
                        focus:outline-none focus:ring-2 focus:ring-slate-700" />
          <button id="btnModTambah" class="px-3 py-2 rounded bg-slate-700 hover:bg-slate-600 font-semibold whitespace-nowrap">
            Tambah Fakta
          </button>
        </div>
      </div>

      <div id="factsList" class="grid gap-2 mb-4"></div>

      <div id="bulkAddContainer" class="hidden flex flex-col gap-2 mb-8 p-3 bg-slate-800/50 rounded-lg border border-slate-700">
        <p class="text-xs text-slate-400">Format: Baris 1=Tajuk, Baris 2=Ayat. Selang baris kosong untuk fakta seterusnya.</p>
        <textarea id="bulkFactsInput" rows="5" placeholder="Contoh:&#10;Kucing&#10;Kucing ada empat kaki&#10;&#10;Ayam&#10;Ayam bertelur" 
                  class="w-full px-3 py-2 rounded bg-slate-900 text-sm focus:outline-none"></textarea>
        <button id="btnTambahSemuaPantas" class="w-full py-2 rounded bg-blue-700 hover:bg-blue-600 font-bold text-sm">
          Proses Masuk Semua
        </button>
      </div>
    </section>

    <section id="page-practice" class="hidden">
      <div class="mb-2 flex items-center justify-between">
        <button id="backToFacts" class="px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 text-sm">Kembali</button>
        <div class="text-sm text-slate-300 font-semibold">Ulangan: <span id="practiceCount" class="text-blue-400">0</span></div>
      </div>
      
      <div class="mb-4 p-3 bg-slate-800/30 rounded-lg border border-slate-800">
        <h4 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Fakta</h4>
        <div id="practiceFactTitle" class="text-lg font-bold text-slate-200 mb-3"></div>
        <h4 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Ayat</h4>
        <div id="practiceFactSentence" class="text-slate-300 italic"></div>
      </div>

      <div id="practiceRows" class="grid gap-4 mb-20 transition-all duration-500"></div>

      <div class="mt-4 pb-10">
        <button id="submitPracticeBtn" class="w-full py-3 rounded bg-blue-700 hover:bg-blue-600 font-bold shadow-xl border border-blue-500">
          Semak Jawapan
        </button>
        <p id="practiceFeedback" class="mt-3 text-center font-semibold text-slate-200"></p>
      </div>

      <button id="addPracticeRowBtn" 
              class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 
                     flex items-center justify-center shadow-2xl z-30 border-2 border-slate-500 text-2xl font-bold">
        +
      </button>
    </section>
  </main>

  <footer class="px-4 py-6 text-center text-sm text-slate-400">Very good job!</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs, query, orderBy, enableIndexedDbPersistence } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDei41iK-bTsffaza5lKO9fM3l_4jF8sec",
      authDomain: "versibmretyping.firebaseapp.com",
      projectId: "versibmretyping",
      storageBucket: "versibmretyping.firebasestorage.app",
      messagingSenderId: "216301139894",
      appId: "1:216301139894:web:6f55797142cf61aa8eb317",
      measurementId: "G-D7ZH9R8ZHL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    enableIndexedDbPersistence(db).catch(err => console.warn("Persistence error:", err.code));

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    // === State ===
    let uid = null;
    let currentSubject = null;
    let currentTopic = null;
    let currentFact = null;

    // === Auth ===
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const installBtn = document.getElementById('installBtn');

    loginBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        console.error(e);
        alert('Log masuk gagal: ' + e.message);
      }
    });
    logoutBtn.addEventListener('click', async () => { await signOut(auth); });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        uid = user.uid;
        logoutBtn.classList.remove('hidden');
        installBtn.classList.remove('hidden');
        showPage('subjects');
        await loadSubjects();
      } else {
        uid = null;
        logoutBtn.classList.add('hidden');
        showPage('login');
      }
    });

    // === Routing ===
    const pages = {
      login: document.getElementById('page-login'),
      subjects: document.getElementById('page-subjects'),
      topics: document.getElementById('page-topics'),
      facts: document.getElementById('page-facts'),
      practice: document.getElementById('page-practice'),
    };
    function showPage(name) {
      Object.values(pages).forEach(el => el.classList.add('hidden'));
      pages[name].classList.remove('hidden');
    }

    // === Subjects ===
    const subjectSearch = document.getElementById('subjectSearch');
    const addSubjectBtn = document.getElementById('addSubjectBtn');
    const subjectsList = document.getElementById('subjectsList');

    async function loadSubjects(filterText = '') {
      subjectsList.innerHTML = '';
      const q = query(collection(db, 'users', uid, 'subjects'), orderBy('name', 'asc'));
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = d.data();
        if (filterText && !data.name.toLowerCase().includes(filterText.toLowerCase())) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'flex items-center gap-2 bg-slate-800 rounded p-2';
        const btn = document.createElement('button');
        btn.textContent = data.name;
        btn.className = 'flex-1 text-left';
        btn.onclick = () => enterSubject({id: d.id, ...data});
        wrapper.appendChild(btn);
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️';
        editBtn.onclick = async () => {
          const newName = prompt('Edit nama subjek:', data.name);
          if (newName) {
            await updateDoc(d.ref, {name: newName});
            loadSubjects(filterText);
          }
        };
        wrapper.appendChild(editBtn);
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️';
        delBtn.onclick = async () => {
          if (confirm('Padam subjek ini?')) {
            await deleteDoc(d.ref);
            loadSubjects(filterText);
          }
        };
        wrapper.appendChild(delBtn);
        subjectsList.appendChild(wrapper);
      });
    }

    subjectSearch.addEventListener('input', e => loadSubjects(e.target.value));
    addSubjectBtn.addEventListener('click', async () => {
      const name = prompt('Nama subjek?');
      if (!name) return;
      await addDoc(collection(db, 'users', uid, 'subjects'), {name, createdAt: Date.now()});
      loadSubjects(subjectSearch.value || '');
    });

    function enterSubject(s) {
      currentSubject = s;
      document.getElementById('currentSubjectName').textContent = s.name;
      showPage('topics');
      loadTopics();
    }

    // === Topics ===
    const topicSearch = document.getElementById('topicSearch');
    const addTopicBtn = document.getElementById('addTopicBtn');
    const topicsList = document.getElementById('topicsList');
    const backToSubjects = document.getElementById('backToSubjects');

    async function loadTopics(filterText = '') {
      topicsList.innerHTML = '';
      const ref = doc(db, 'users', uid, 'subjects', currentSubject.id);
      const q = query(collection(ref, 'topics'), orderBy('name', 'asc'));
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = d.data();
        if (filterText && !data.name.toLowerCase().includes(filterText.toLowerCase())) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'flex items-center gap-2 bg-slate-800 rounded p-2';
        const btn = document.createElement('button');
        btn.textContent = data.name;
        btn.className = 'flex-1 text-left';
        btn.onclick = () => enterTopic({id: d.id, ...data});
        wrapper.appendChild(btn);
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️';
        editBtn.onclick = async () => {
          const newName = prompt('Edit nama topik:', data.name);
          if (newName) {
            await updateDoc(d.ref, {name: newName});
            loadTopics(filterText);
          }
        };
        wrapper.appendChild(editBtn);
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️';
        delBtn.onclick = async () => {
          if (confirm('Padam topik ini?')) {
            await deleteDoc(d.ref);
            loadTopics(filterText);
          }
        };
        wrapper.appendChild(delBtn);
        topicsList.appendChild(wrapper);
      });
    }

    topicSearch.addEventListener('input', e => loadTopics(e.target.value));
    addTopicBtn.addEventListener('click', async () => {
      const name = prompt('Nama topik?');
      if (!name) return;
      const ref = doc(db, 'users', uid, 'subjects', currentSubject.id);
      await addDoc(collection(ref, 'topics'), {name, createdAt: Date.now()});
      loadTopics(topicSearch.value || '');
    });
    backToSubjects.addEventListener('click', () => showPage('subjects'));

    function enterTopic(t) {
      currentTopic = t;
      document.getElementById('currentTopicName').textContent = t.name;
      showPage('facts');
      loadFacts();
    }

    // === Facts ===
    const factSearch = document.getElementById('factSearch');
    const btnModTambah = document.getElementById('btnModTambah');
    const bulkAddContainer = document.getElementById('bulkAddContainer');
    const btnTambahSemuaPantas = document.getElementById('btnTambahSemuaPantas');
    const bulkFactsInput = document.getElementById('bulkFactsInput');
    const factsList = document.getElementById('factsList');
    const backToTopics = document.getElementById('backToTopics');

    backToTopics.addEventListener('click', () => showPage('topics'));
    
    btnModTambah.addEventListener('click', () => {
        bulkAddContainer.classList.toggle('hidden');
        if(!bulkAddContainer.classList.contains('hidden')) {
            bulkAddContainer.scrollIntoView({ behavior: 'smooth' });
        }
    });

    async function loadFacts(filterText = '') {
      factsList.innerHTML = '';
      const ref = doc(db, 'users', uid, 'subjects', currentSubject.id, 'topics', currentTopic.id);
      const q = query(collection(ref, 'facts'), orderBy('title', 'asc'));
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = d.data();
        if (filterText && !data.title.toLowerCase().includes(filterText.toLowerCase())) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'flex flex-col gap-2 bg-slate-800 rounded p-3 border border-slate-700';
        const content = document.createElement('div');
        content.className = 'flex-1';
        content.innerHTML = `<div class="font-bold text-blue-400">${data.title}</div><div class="text-sm text-slate-300 italic mt-1">${data.sentence}</div>`;
        wrapper.appendChild(content);
        const actions = document.createElement('div');
        actions.className = 'flex items-center gap-3 justify-end mt-2 pt-2 border-t border-slate-700/50';
        const practiceBtn = document.createElement('button');
        practiceBtn.textContent = '📝 Latih';
        practiceBtn.className = 'text-xs bg-slate-700 px-2 py-1 rounded hover:bg-slate-600';
        practiceBtn.onclick = () => startPractice({id: d.id, ...data});
        actions.appendChild(practiceBtn);
        const editTitleBtn = document.createElement('button');
        editTitleBtn.textContent = '✏️ Tajuk';
        editTitleBtn.className = 'text-xs bg-slate-700 px-2 py-1 rounded hover:bg-slate-600';
        editTitleBtn.onclick = async () => {
          const nt = prompt('Edit tajuk fakta sahaja:', data.title);
          if (nt) {
            await updateDoc(d.ref, {title: nt});
            loadFacts(filterText);
          }
        };
        actions.appendChild(editTitleBtn);
        const editSentenceBtn = document.createElement('button');
        editSentenceBtn.textContent = '✏️ Ayat';
        editSentenceBtn.className = 'text-xs bg-slate-700 px-2 py-1 rounded hover:bg-slate-600';
        editSentenceBtn.onclick = async () => {
          const ns = prompt('Edit ayat fakta sahaja:', data.sentence);
          if (ns) {
            await updateDoc(d.ref, {sentence: ns});
            loadFacts(filterText);
          }
        };
        actions.appendChild(editSentenceBtn);
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️';
        delBtn.className = 'text-xs bg-red-900/50 px-2 py-1 rounded hover:bg-red-800';
        delBtn.onclick = async () => {
          if (confirm('Padam fakta ini secara kekal?')) {
            await deleteDoc(d.ref);
            loadFacts(filterText);
          }
        };
        actions.appendChild(delBtn);
        wrapper.appendChild(actions);
        factsList.appendChild(wrapper);
      });
    }

    factSearch.addEventListener('input', e => loadFacts(e.target.value));

    // --- LOGIK DIKEMASKINI: TAMBAH FAKTA ---
    btnTambahSemuaPantas.addEventListener('click', async () => {
      const text = bulkFactsInput.value.trim();
      if (!text) return;
      const ref = collection(db, 'users', uid, 'subjects', currentSubject.id, 'topics', currentTopic.id, 'facts');
      
      // Pecahkan blok guna selang baris kosong
      const blocks = text.split(/\n\s*\n/);
      
      for (const block of blocks) {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        if (lines.length >= 2) {
          // Normal: Baris 1=Tajuk, Baris 2=Ayat
          await addDoc(ref, { title: lines[0], sentence: lines[1], createdAt: Date.now() });
        } else if (lines.length === 1) {
          // PERMINTAAN: Jika ada 1 baris sahaja, set tajuk ke "ERROR"
          await addDoc(ref, { title: "ERROR", sentence: lines[0], createdAt: Date.now() });
        }
      }
      bulkFactsInput.value = '';
      bulkAddContainer.classList.add('hidden');
      loadFacts();
    });

    // === Practice ===
    const backToFacts = document.getElementById('backToFacts');
    const practiceRows = document.getElementById('practiceRows');
    const addPracticeRowBtn = document.getElementById('addPracticeRowBtn');
    const submitPracticeBtn = document.getElementById('submitPracticeBtn');

    backToFacts.addEventListener('click', () => showPage('facts'));

    function startPractice(f) {
      currentFact = f;
      document.getElementById('practiceFactTitle').textContent = f.title;
      document.getElementById('practiceFactSentence').textContent = f.sentence;
      document.getElementById('practiceFeedback').textContent = '';
      practiceRows.innerHTML = '';
      document.getElementById('practiceCount').textContent = '0';
      showPage('practice');
      addPracticeRow();
    }

    function addPracticeRow() {
      const div = document.createElement('div');
      div.className = 'flex flex-col gap-1 transition-opacity duration-700';
      div.innerHTML = `
        <div class="flex items-center gap-2">
            <textarea class="flex-1 px-3 py-2 rounded bg-slate-800 text-sm focus:ring-1 focus:ring-slate-600 outline-none border border-transparent focus:border-slate-500 transition-all duration-700" rows="2" placeholder="Taip semula di sini..."></textarea>
            <button class="btn-del-row text-lg p-2 hover:bg-slate-700 rounded transition-colors">🗑️</button>
        </div>
      `;
      div.querySelector('.btn-del-row').onclick = () => {
        div.remove();
        updatePracticeCount();
      };
      practiceRows.appendChild(div);
      updatePracticeCount();
      div.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    addPracticeRowBtn.addEventListener('click', addPracticeRow);

    function updatePracticeCount() {
      document.getElementById('practiceCount').textContent = practiceRows.children.length;
    }

    // --- Fungsi Bantuan: Kira Jarak Ejaan (Levenshtein) ---
    function getLevenshtein(a, b) {
      const tmp = [];
      for (let i = 0; i <= a.length; i++) tmp[i] = [i];
      for (let j = 0; j <= b.length; j++) tmp[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          tmp[i][j] = Math.min(
            tmp[i - 1][j] + 1,
            tmp[i][j - 1] + 1,
            tmp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
          );
        }
      }
      return tmp[a.length][b.length];
    }

    submitPracticeBtn.addEventListener('click', () => {
      const rows = practiceRows.querySelectorAll('div.flex-col');
      const targetSentence = currentFact.sentence.trim();
      const targetWords = targetSentence.split(/\s+/);
      let totalTepat = 0;
      
      rows.forEach(row => {
        const input = row.querySelector('textarea');
        let feedbackArea = row.querySelector('.ejaan-feedback');
        if (!feedbackArea) {
          feedbackArea = document.createElement('div');
          feedbackArea.className = "ejaan-feedback text-[11px] mt-1 leading-relaxed px-1";
          row.appendChild(feedbackArea);
        }

        const userSentence = input.value.trim();
        const userWords = userSentence.split(/\s+/);

        if (userSentence.toLowerCase() === targetSentence.toLowerCase()) {
          totalTepat++;
          input.className = "flex-1 px-3 py-2 rounded bg-slate-800/40 border-slate-800 text-slate-600 text-sm transition-all duration-700";
          row.style.opacity = "0.4";
          feedbackArea.innerHTML = "<span class='text-green-500 font-bold'>✓ Tepat Sebutan & Ejaan</span>";
        } 
        else {
          let htmlResult = "";
          targetWords.forEach((tWord, index) => {
            const uWord = userWords[index] || "";
            const cleanTWord = tWord.toLowerCase().replace(/[.,!?;]/g, "");
            const cleanUWord = uWord.toLowerCase().replace(/[.,!?;]/g, "");
            const dist = getLevenshtein(cleanTWord, cleanUWord);
            const tolerance = Math.max(1, Math.floor(cleanTWord.length / 3));

            if (uWord === "") {
              htmlResult += `<span class="text-slate-500 line-through decoration-red-500 opacity-50">${tWord}</span> `;
            } else if (dist === 0) {
              htmlResult += `<span class="text-slate-400">${uWord}</span> `;
            } else if (dist <= tolerance) {
              htmlResult += `<span class="text-orange-400 font-bold underline decoration-orange-500">${uWord}</span> `;
            } else {
              htmlResult += `<span class="text-red-500 font-bold underline decoration-red-700">${uWord}</span> `;
            }
          });

          input.className = "flex-1 px-3 py-2 rounded bg-red-900/10 border-red-500/30 text-white text-sm transition-all duration-700";
          row.style.opacity = "1";
          feedbackArea.innerHTML = `<span class="text-slate-500 text-[9px] uppercase tracking-tighter">Analisis:</span> ${htmlResult}`;
        }
      });
      document.getElementById('practiceFeedback').textContent = `Selesai menyemak ${rows.length} ulangan. Perbaiki bahagian berwarna.`;
    });
  </script>
</body>
</html>
